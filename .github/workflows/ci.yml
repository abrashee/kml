name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: kml_admin
          POSTGRES_PASSWORD: kml_pass
          POSTGRES_DB: kml_test_db
        options: >-
          --health-cmd "pg_isready -U kml_admin -d kml_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean install -B
      working-directory: backend

    - name: Run tests
      run: mvn test -B
      working-directory: backend

    - name: Lint placeholder
      run: echo "Linting will be added here"
